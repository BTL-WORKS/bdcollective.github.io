<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --coral: #ff4d5e;
    --white-soft: rgba(255, 255, 255, 0.70);
  }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 70% at 50% 50%,
        rgba(255, 110, 110, 0.40) 0%,
        rgba(210, 60, 80, 0.22) 30%,
        transparent 65%);
    pointer-events: none;
    z-index: 0;
    filter: blur(3px);
    animation: breathe 14s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
    50%      { transform: translate(2%, -1%) scale(1.10); opacity: 0.92; }
  }
  .wrap {
    position: relative;
    z-index: 2;
    max-width: 760px;
    text-align: center;
  }
  .pill {
    display: inline-block;
    width: 1.45em;
    height: 0.62em;
    background: currentColor;
    border-radius: 999px;
    vertical-align: 0.14em;
    margin: 0 0.08em;
  }
  h1 {
    font-size: clamp(40px, 7vw, 100px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 36px;
  }
  h1 .pill { background: var(--coral); }
  p {
    font-size: clamp(16px, 1.3vw, 20px);
    color: var(--white-soft);
    margin-bottom: 16px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
  .btn-row {
    display: inline-flex;
    gap: 12px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 6px 14px 22px;
    border: 1.5px solid currentColor;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    transition: background 240ms, color 240ms, border-color 240ms;
  }
  .btn--primary { background: var(--coral); color: var(--white); border-color: var(--coral); padding: 14px 6px 14px 24px; }
  .btn--primary .btn__arrow { background: var(--white); color: var(--coral); border-color: var(--white); }
  .btn--primary:hover { background: var(--white); color: var(--black); border-color: var(--white); }
  .btn--primary:hover .btn__arrow { background: var(--coral); color: var(--white); border-color: var(--coral); }
  .btn--ghost { color: var(--white); padding: 14px 22px; }
  .btn--ghost:hover { background: var(--white); color: var(--black); }
  .btn__arrow {
    width: 36px; height: 36px;
    border-radius: 999px;
    border: 1.5px solid currentColor;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 280ms, background 240ms, color 240ms;
  }
  .btn:hover .btn__arrow { transform: translateX(3px); }
  a { color: inherit; text-decoration: none; }
  .eyebrow {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--white-soft);
    display: inline-flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 28px;
  }
  .eyebrow::before {
    content: '';
    width: 28px; height: 1.5px;
    background: var(--coral);
  }
</style>
